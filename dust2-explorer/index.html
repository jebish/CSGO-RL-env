<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dust2 Explorer</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="hud">
    <div id="minimap-wrap" hidden>
      <canvas id="minimap-canvas" width="148" height="148"></canvas>
    </div>
    <div id="prompt" hidden>Press <kbd>E</kbd> to interact</div>
    <div id="panel" hidden>
      <button id="panel-close" type="button" aria-label="Close">×</button>
      <h2 id="panel-title"></h2>
      <p id="panel-body"></p>
    </div>
  </div>

  <footer id="controls-footer">
    <span id="footer-text">Loading map…</span>
  </footer>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
