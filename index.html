<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dust2 Explorer</title>
  <link rel="stylesheet" href="css/style.css?v=10" />
</head>
<body>
  <div id="menu-root" class="menu-root menu-open">
    <div id="menu-error" class="menu-error" hidden></div>
    <div id="menu-user" class="menu-user">Checking HF login…</div>

    <section id="menu-start" class="menu-panel">
      <h1 class="menu-brand">Dust2</h1>
      <p class="menu-sub">Sandbox · 1v1 · 4v4</p>
      <div class="menu-actions">
        <button type="button" id="btn-mode-sandbox" class="menu-btn">Sandbox</button>
        <button type="button" id="btn-mode-1v1" class="menu-btn">1v1</button>
        <button type="button" id="btn-mode-4v4" class="menu-btn">4v4</button>
      </div>
    </section>

    <section id="menu-lobby" class="menu-panel menu-lobby" hidden>
      <div class="lobby-toolbar">
        <button type="button" id="btn-lobby-back" class="menu-btn ghost">Back</button>
        <h2 id="lobby-title">Lobbies</h2>
        <div class="lobby-actions">
          <button type="button" id="btn-lobby-leave" class="menu-btn ghost">Leave seat</button>
          <button type="button" id="btn-lobby-enter" class="menu-btn">Enter / wait match</button>
        </div>
      </div>
      <p id="lobby-meta" class="lobby-meta"></p>
      <div id="lobby-list" class="lobby-list"></div>
    </section>
  </div>

  <div id="hud" hidden>
    <div id="damage-vignette" aria-hidden="true"></div>
    <div id="player-hud" hidden>
      <img id="player-avatar" alt="" width="40" height="40" />
      <span id="player-name"></span>
    </div>
    <div id="hp-hud" aria-label="health">
      <svg class="hp-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 21s-7.2-4.6-9.5-8.6C.6 9.2 2.2 5.5 6 5.5c2 0 3.3 1.2 4 2.4.7-1.2 2-2.4 4-2.4 3.8 0 5.4 3.7 3.5 6.9C19.2 16.4 12 21 12 21z"/>
      </svg>
      <span id="hp-value">100</span>
    </div>
    <div id="weapon-hud" data-weapon="machinegun" aria-label="weapon"></div>
    <div id="ammo-hud">80-1000</div>
    <div id="crosshair" hidden aria-hidden="true">
      <span class="ch ch-top"></span>
      <span class="ch ch-bottom"></span>
      <span class="ch ch-left"></span>
      <span class="ch ch-right"></span>
      <span class="ch ch-dot"></span>
    </div>
    <div id="prompt" hidden>Press <kbd>E</kbd> to interact</div>
    <div id="panel" hidden>
      <button id="panel-close" type="button" aria-label="Close">×</button>
      <h2 id="panel-title"></h2>
      <p id="panel-body"></p>
    </div>
  </div>

  <!-- Outside #hud so position:fixed is always viewport bottom-left -->
  <div id="minimap-wrap" hidden>
    <canvas id="minimap-canvas" width="148" height="148"></canvas>
  </div>

  <footer id="controls-footer">
    <span id="footer-text">Loading map…</span>
  </footer>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="js/main.js?v=10"></script>
</body>
</html>
